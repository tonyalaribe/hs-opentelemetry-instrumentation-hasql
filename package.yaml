name:                hs-opentelemetry-instrumentation-hasql
version:             0.1.0.0
github:              monoscope-tech/hs-opentelemetry-instrumentation-hasql
license:             BSD3
author:              Monoscope Engineering
maintainer:          engineering@monoscope.tech
copyright:           2026 Monoscope, Inc.
synopsis:            OpenTelemetry tracing instrumentation for the hasql Postgres client.
category:            OpenTelemetry, Instrumentation, Database
description:         Please see the README on GitHub at <https://github.com/monoscope-tech/hs-opentelemetry-instrumentation-hasql#readme>

extra-source-files:
- README.md
- ChangeLog.md

default-extensions:
- OverloadedStrings
- LambdaCase
- NamedFieldPuns
- RecordWildCards
- DerivingStrategies
- StrictData
- ScopedTypeVariables

dependencies:
- base >= 4.7 && < 5
- bytestring
- text
- unordered-containers
- hs-opentelemetry-api >= 0.1 && < 1
- hasql >= 1.6 && < 2
- hasql-pool >= 1 && < 2

library:
  source-dirs: src

tests:
  hs-opentelemetry-instrumentation-hasql-test:
    main:        Spec.hs
    source-dirs: test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hs-opentelemetry-instrumentation-hasql
